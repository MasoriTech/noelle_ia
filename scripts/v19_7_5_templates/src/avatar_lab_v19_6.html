<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: blob: data:; script-src 'self' 'unsafe-inline' file: blob:; style-src 'self' 'unsafe-inline'; img-src 'self' file: blob: data:; media-src 'self' file: blob: data:; connect-src 'self' file: blob: data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noelle/Yoru Avatar Carousel</title>
  <style>
    :root {
      --bg: #080711;
      --panel: rgba(15, 14, 27, .96);
      --panel2: rgba(27, 24, 42, .94);
      --line: rgba(255, 80, 137, .28);
      --line2: rgba(255,255,255,.11);
      --text: #fff4fb;
      --muted: #cdbdd8;
      --accent: #ff4f94;
      --accent2: #8b7bff;
      --ok: #36f5aa;
      --warn: #ffd166;
      --danger: #ff6b7a;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      background: radial-gradient(circle at 35% 16%, rgba(255,79,148,.14), transparent 34%), var(--bg);
      color: var(--text);
    }
    .app { height: 100vh; padding: 22px; display: grid; grid-template-rows: auto 1fr; gap: 16px; }
    .top { display: flex; align-items: end; justify-content: space-between; gap: 16px; }
    .title h1 { margin: 0; font-size: 28px; letter-spacing: -.03em; }
    .title p { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
    .pill { border: 1px solid var(--line2); background: rgba(255,255,255,.06); border-radius: 999px; padding: 8px 12px; color: var(--muted); font-weight: 750; }
    .pill.ok { color: var(--ok); border-color: rgba(54,245,170,.34); }
    .pill.warn { color: var(--warn); border-color: rgba(255,209,102,.34); }
    .pill.danger { color: var(--danger); border-color: rgba(255,107,122,.34); }
    .layout { min-height: 0; display: grid; grid-template-columns: minmax(560px, 1fr) 330px; gap: 18px; }
    .stageCard, .sideCard {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
      overflow: hidden;
    }
    .stageCard { display: grid; grid-template-rows: 1fr auto; }
    .stage { position: relative; min-height: 0; background: radial-gradient(circle at 50% 20%, rgba(255,255,255,.12), transparent 28%); }
    canvas { display: block; width: 100%; height: 100%; min-height: 560px; }
    .statusLayer { position: absolute; left: 18px; top: 18px; right: 18px; display: flex; gap: 8px; flex-wrap: wrap; pointer-events: none; }
    .nav { border-top: 1px solid var(--line2); padding: 14px 18px 18px; display: grid; grid-template-columns: 78px 1fr 78px; gap: 14px; align-items: center; background: rgba(0,0,0,.14); }
    .avatarName { text-align: center; }
    .avatarName strong { display: block; font-size: 22px; letter-spacing: -.02em; }
    .avatarName span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; word-break: break-all; }
    button, select, input[type='file']::file-selector-button {
      border: 1px solid var(--line2);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 850;
      cursor: pointer;
      transition: transform .12s ease, filter .12s ease, border-color .12s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.08); border-color: rgba(255,255,255,.22); }
    button.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; }
    button.bigArrow { height: 58px; font-size: 28px; border-radius: 20px; }
    .sideCard { padding: 18px; display: flex; flex-direction: column; gap: 16px; }
    .sideCard h2 { margin: 0; font-size: 22px; }
    .group { display: grid; gap: 9px; }
    label { color: var(--muted); font-size: 13px; font-weight: 800; }
    select { width: 100%; color-scheme: dark; background: var(--panel2); }
    .modeGrid { display: grid; gap: 10px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.45; margin: 0; }
    .debug { margin-top: auto; max-height: 116px; overflow: auto; padding: 10px; border-radius: 14px; border: 1px solid var(--line2); background: rgba(255,255,255,.045); color: var(--muted); font: 12px/1.4 ui-monospace, Consolas, monospace; white-space: pre-wrap; }
    @media (max-width: 980px) {
      .app { overflow: auto; height: auto; min-height: 100vh; }
      body { overflow: auto; }
      .layout { grid-template-columns: 1fr; }
      canvas { min-height: 520px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title">
        <h1>Avatar</h1>
        <p>Escolha o personagem. O foco é o VRM grande; as setas ficam embaixo.</p>
      </div>
      <div id="statusPill" class="pill warn">Inicializando preview...</div>
    </header>

    <section class="layout" aria-label="Selecionador visual de avatar">
      <div class="stageCard">
        <div class="stage">
          <canvas id="avatarCanvas"></canvas>
          <div id="overlayPills" class="statusLayer"></div>
        </div>
        <nav class="nav" aria-label="Trocar personagem">
          <button id="prevAvatar" class="bigArrow" title="Avatar anterior">←</button>
          <div class="avatarName">
            <strong id="avatarName">Carregando...</strong>
            <span id="avatarFile">aguarde</span>
          </div>
          <button id="nextAvatar" class="bigArrow" title="Próximo avatar">→</button>
        </nav>
      </div>

      <aside class="sideCard">
        <h2>Opções</h2>
        <div class="group">
          <label for="avatarSelect">Personagem</label>
          <select id="avatarSelect"></select>
        </div>
        <div class="group">
          <label>Usar avatar em</label>
          <div class="modeGrid">
            <button id="btnRoom" class="primary">Room / Quarto</button>
            <button id="btnWidget">Widget Mode</button>
            <button id="btnPreview">Preview / Teste</button>
          </div>
        </div>
        <div class="group">
          <label>Ações</label>
          <button id="btnSave">Salvar avatar padrão</button>
          <button id="btnResetCamera">Reset câmera</button>
          <input id="localFile" type="file" accept=".vrm,.glb,model/gltf-binary" />
        </div>
        <p class="hint">A aba Avatar só escolhe e mostra o personagem. Room, Widget e Preview ficam separados.</p>
        <pre id="debugBox" class="debug">Aguardando...</pre>
      </aside>
    </section>
  </main>

  <script src="./renderer/avatar_manifest_runtime_v19_7_5.js"></script>
  <script src="./renderer_dist/avatar_lab_v19_6.bundle.js"></script>
</body>
</html>
